<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title | default: site.title }}</title>

  <meta name="description" content="{{ page.description | default: site.description }}">

  <meta name="robots" content="index, follow">

  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/assets/img/og-paralel.jpg' | absolute_url }}">

  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body>

  {% include header.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <a class="whatsapp-float"
     href="https://wa.me/51912576685?text=Hola%2C%20quiero%20cotizar%20una%20experiencia%20interactiva%20para%20un%20evento."
     target="_blank"
     rel="noopener"
     aria-label="Cotizar por WhatsApp">
    ☎
  </a>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>

</body>
</html>
